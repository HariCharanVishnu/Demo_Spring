<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Task</title>
</head>
<body>
<h2>Edit Task</h2>

<form th:action="@{/tasks/edit/{id}(id=${task.id})}" th:object="${task}" method="post">
    <label>Title:</label>
    <input type="text" th:field="*{title}" />
    <div th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>

    <label>Description:</label>
    <textarea th:field="*{description}"></textarea>
    <div th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>

    <label>Completed:</label>
    <input type="checkbox" th:field="*{completed}" />

    <button type="submit">Update Task</button>
</form>

<a th:href="@{/tasks/list}">Back to List</a>
</body>
</html>
