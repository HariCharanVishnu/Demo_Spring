<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Tasks List</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">

<h2 class="mb-4">All Tasks</h2>

<table class="table table-striped table-hover">
    <thead class="table-dark">
    <tr>
        <th><a th:href="@{/tasks/list(sortBy='title')}" class="text-white">Title</a></th>
        <th><a th:href="@{/tasks/list(sortBy='description')}" class="text-white">Description</a></th>
        <th><a th:href="@{/tasks/list(sortBy='completed')}" class="text-white">Completed</a></th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="task : ${tasks}">
        <td th:text="${task.title}"></td>
        <td th:text="${task.description}"></td>
        <td>
            <span th:text="${task.completed ? 'Yes' : 'No'}"
                  th:classappend="${task.completed} ? 'badge bg-success' : 'badge bg-warning'"></span>
        </td>
        <td>
            <a th:href="@{/tasks/edit/{id}(id=${task.id})}" class="btn btn-sm btn-primary">Edit</a>
            <a th:href="@{/tasks/delete/{id}(id=${task.id})}" class="btn btn-sm btn-danger">Delete</a>
        </td>
    </tr>
    </tbody>
</table>

<!-- Pagination Controls -->
<nav aria-label="Page navigation">
    <ul class="pagination">
        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
            <a class="page-link"
               th:href="@{/tasks/list(page=${currentPage - 1}, sortBy=${sortBy})}">Previous</a>
        </li>

        <li class="page-item disabled">
            <a class="page-link" th:text="'Page ' + ${currentPage + 1} + ' of ' + ${totalPages}"></a>
        </li>

        <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
            <a class="page-link"
               th:href="@{/tasks/list(page=${currentPage + 1}, sortBy=${sortBy})}">Next</a>
        </li>
    </ul>
</nav>

<a th:href="@{/tasks/add}" class="btn btn-success mt-3">Add New Task</a>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
