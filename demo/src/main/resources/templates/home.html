<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>To-Do List Home</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>
<body class="container mt-5">

<h1 class="mb-4">Welcome to the To-Do List App</h1>
<p class="lead">Choose an option below:</p>

<div class="list-group">
    <!-- View all tasks -->
    <a th:href="@{/tasks/list}" class="list-group-item list-group-item-action">
        📋 View All Tasks
    </a>

    <!-- Add new task (separate page) -->
    <a th:href="@{/tasks/add}" class="list-group-item list-group-item-action">
        ➕ Add New Task
    </a>
</div>

</body>
</html>
